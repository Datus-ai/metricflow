[mypy]
# https://mypy.readthedocs.io/en/stable/config_file.html
warn_unused_configs = True
disallow_untyped_defs = True
warn_redundant_casts = True
namespace_packages = True
plugins = pydantic.mypy, sqlalchemy.ext.mypy.plugin

# Pydantic models legitimately require Any in field definitions
disallow_any_explicit = False

# Legacy structural type issues from Pydantic V1→V2 migration and original MetricFlow.
# These require major refactoring to fix properly; suppress to keep mypy useful for new code.
disable_error_code = union-attr, list-item, type-var, arg-type, call-overload, attr-defined, assignment

# Test files: relax untyped defs requirement
[mypy-metricflow.test.*]
disallow_untyped_defs = False

# Legacy Pydantic V1/V2 modules
[mypy-metricflow.model.objects.*]
disallow_untyped_defs = False

[mypy-metricflow.model.transformations.*]
ignore_errors = True

[mypy-metricflow.model.dbt_converter]
ignore_errors = True

[mypy-metricflow.model.dbt_mapping_rules.*]
ignore_errors = True

[mypy-metricflow.model.validations.*]
disallow_untyped_defs = False

[mypy-metricflow.model.parsing.*]
disallow_untyped_defs = False

[mypy-metricflow.model.data_warehouse_model_validator]
disallow_untyped_defs = False

[mypy-metricflow.model.semantics.*]
disallow_untyped_defs = False

# Core modules with legacy type issues
[mypy-metricflow.plan_conversion.*]
disallow_untyped_defs = False

[mypy-metricflow.dataflow.builder.*]
disallow_untyped_defs = False

[mypy-metricflow.query.*]
disallow_untyped_defs = False

[mypy-metricflow.cli.*]
disallow_untyped_defs = False

[mypy-metricflow.dataclass_serialization]
disallow_untyped_defs = False

[mypy-metricflow.errors.*]
disallow_untyped_defs = False

[mypy-metricflow.configuration.*]
disallow_untyped_defs = False

# SQL layer
[mypy-metricflow.sql_clients.snowflake]
ignore_errors = True

[mypy-metricflow.sql.sql_exprs]
disallow_untyped_defs = False

[mypy-metricflow.sql.render.sqlite]
disallow_untyped_defs = False

[mypy-metricflow.sql.render.big_query]
disallow_untyped_defs = False

# Legacy files with deep Pydantic/type issues that require major refactoring
[mypy-metricflow.model.objects.base]
ignore_errors = True

[mypy-metricflow.sql_clients.sqlite]
disallow_untyped_defs = False

[mypy-metricflow.model.parsing.dir_to_model]
ignore_errors = True

# MCP server module
[mypy-mcp_metricflow.*]
disallow_untyped_defs = False
